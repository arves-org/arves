# ARVES — mechanical gates (CI)
# =============================================================================
# This workflow is the machine-checkable half of the ARVES freeze + evidence
# discipline. Every job here runs a gate that already exists and passes locally;
# wiring them into CI turns "the author ran it" into "the branch cannot merge
# unless it passes".
#
# STATUS: LIVE as of the arves-org publish (2026-07) — these jobs run on GitHub-hosted
# runners on every push/PR. Pair with branch protection that marks the `freeze` job
# "Required" so freeze drift is a HARD merge blocker (freeze_check.py exits non-zero
# on drift, which fails the step and the job). Freeze hashing is line-ending-
# independent (CRLF->LF normalized), so Windows and Linux checkouts agree.
#
# Gates (all present in-repo):
#   * freeze     — verification/freeze/freeze_check.py check    (HARD: drift => fail)
#   * robustness — products/robustness.test.mjs
#   * certify    — verification/certification/certify_runtime.py
#                  verification/certification/test_harness_integrity.py
#   * evidence   — verification/evidence/evidence_probe.py
#   * rust       — cargo test over the runtime workspace
#   * industrial — verification/industrial L4 sweeps (fault-injection +
#                  replay-equivalence + perf smoke), SMOKE band per push so the
#                  L4 evidence is regression-protected; the full headline band
#                  (512/128/256/192 seeds) runs on manual/nightly dispatch.
# =============================================================================

name: ARVES mechanical gates

"on":
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      l4_full:
        description: "Run the L4 industrial sweeps at the FULL headline band (512/128/256/192 seeds) instead of the fast smoke band."
        type: boolean
        default: false

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  # FREEZE — the load-bearing gate. Any silent edit to runtime/ or standard/
  # (i.e. drift from verification/freeze/freeze_manifest.tsv) makes
  # freeze_check.py exit 1, which fails this step and this job. Mark this job
  # "Required" in branch protection so drift is a HARD merge blocker.
  # --------------------------------------------------------------------------
  freeze:
    name: Freeze gate (runtime/ + standard/ must not drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Freeze self-test (prove the gate detects a tamper)
        run: python verification/freeze/freeze_check.py selftest
      - name: Freeze check (HARD FAIL on any drift)
        run: python verification/freeze/freeze_check.py check

  # --------------------------------------------------------------------------
  # ROBUSTNESS — product robustness test (Node, zero external deps).
  # --------------------------------------------------------------------------
  robustness:
    name: Product robustness test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # The product suites drive the REAL runtime through the bridge; a fresh runner
      # has no prebuilt bins, so build them first (locally they already exist).
      - name: Build the bridge (Runtime API bins)
        run: cargo build --locked -p arves-bridge --manifest-path runtime/Cargo.toml
      - name: Run robustness test
        run: node products/robustness.test.mjs

  # --------------------------------------------------------------------------
  # CERTIFY — runtime certification harness + its own integrity check. The
  # integrity check guards the harness against being silently weakened.
  # --------------------------------------------------------------------------
  certify:
    name: Certification harness + integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Certify runtime
        run: python verification/certification/certify_runtime.py
      - name: Test harness integrity
        run: python verification/certification/test_harness_integrity.py

  # --------------------------------------------------------------------------
  # EVIDENCE — evidence-ledger probe (Standard Validation Era KPI is
  # "Evidence Increased"; this keeps the ledger machine-checked).
  # --------------------------------------------------------------------------
  evidence:
    name: Evidence probe (drift gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # The probe's 12 rows exercise the REAL runtime end-to-end (conformance bins,
      # acs_validate, conformance_live, the bridge-backed capstone) — build the bins a
      # fresh runner lacks. `--locked` pins the committed Cargo.lock.
      - name: Build runtime bins (conformance + bridge)
        run: cargo build --locked -p arves-conformance -p arves-bridge --manifest-path runtime/Cargo.toml
      # --check (not regenerate): CI verifies the COMMITTED ledger cells match a fresh
      # run — metric drift fails the job instead of being silently rewritten.
      - name: Run evidence probe (drift check)
        run: python verification/evidence/evidence_probe.py --check

  # --------------------------------------------------------------------------
  # RUST — reference runtime workspace test suite. Uses the committed
  # Cargo.lock (--locked) so no silent dependency drift enters the build.
  # --------------------------------------------------------------------------
  rust:
    name: Runtime workspace tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo test (workspace)
        run: cargo test --locked --manifest-path runtime/Cargo.toml --workspace

  # --------------------------------------------------------------------------
  # INDUSTRIAL — L4 evidence sweeps (verification/industrial/, a STANDALONE
  # cargo workspace that path-depends on the FROZEN runtime crates per IDR-006,
  # so it is NOT a member of the runtime workspace above and would otherwise be
  # run only by hand). Wiring it here turns "the author ran the L4 sweeps" into
  # "the branch cannot merge if the L4 safety/replay contract regresses".
  #
  # Per-push we run the SMOKE band (ARVES_L4_SMOKE) so the gate is fast (~seconds)
  # yet still adversarial (partitions + isolation + crash→WAL-replay, seeded).
  # The FULL headline band (512/128/256/192 seeds — the documented L4_REPORT.md
  # counts, ~2-3 min) runs on manual dispatch with `l4_full=true`, or a schedule.
  # Determinism is unchanged: the smoke band is a prefix of the same seed stream,
  # so anything it catches replays under the full sweep too.
  # --------------------------------------------------------------------------
  industrial:
    name: L4 industrial evidence (fault-injection + replay + perf)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: L4 sweeps — SMOKE band (per-push regression gate)
        if: ${{ github.event.inputs.l4_full != 'true' }}
        env:
          ARVES_L4_SMOKE: "24"
        run: cargo test --release --locked --manifest-path verification/industrial/Cargo.toml
      - name: L4 sweeps — FULL headline band (manual/nightly dispatch)
        if: ${{ github.event.inputs.l4_full == 'true' }}
        run: cargo test --release --locked --manifest-path verification/industrial/Cargo.toml
