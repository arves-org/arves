\* TLC config — LIVENESS check for ARVES_ClusterLive.tla under weak fairness.
\* Verification evidence for the I2 distributed protocol. NOT normative spec
\* (edits no frozen .docx; ED-001).
\*
\* PARTIAL-SYNCHRONY liveness. SoleCandidate = n1 encodes the assumption Raft's
\* liveness genuinely requires: eventually ONE server's election timeout fires
\* uncontested (in real Raft, randomized timeouts break the split-vote tie). Only n1
\* may time out; under weak fairness on the protocol steps n1 collects a quorum,
\* becomes leader, appends a client entry, replicates it, and commits it. MaxCrash = 0
\* (crashes disabled) — liveness is a "makes progress" claim, and unbounded crashing
\* is (correctly) not required to preserve it; durability under crashes is the
\* separate ARVES_ClusterLive_MC.cfg run.
\*
\* NO SYMMETRY: the TLC_RUN.md lesson is that declaring symmetry while checking a
\* liveness PROPERTY is unsound (it produced a spurious counterexample in the kernel
\* model). We check the full state graph.
\*
\* Honest falsifiability: set SoleCandidate = Nil below and TLC finds a fair split-
\* vote / stuttering counterexample — Raft is NOT live under full dueling elections.
\* That is why the partial-synchrony assumption is declared, not hidden.

SPECIFICATION FairSpec

CONSTANTS
    Server = {n1, n2, n3}
    Nil = Nil
    MaxTerm = 3
    MaxLogLen = 2
    MaxCrash = 0
    SoleCandidate = n1

\* NO CONSTRAINT. TLC warns that a state/action CONSTRAINT during liveness checking
\* is unsound (it can truncate a would-be-violating infinite behavior and pass
\* vacuously — Specifying Systems §14.3.5). We rely on the ACTION GUARDS, which
\* already bound the whole space (Timeout needs term < MaxTerm, ClientRequest needs
\* len < MaxLogLen, Crash needs crashes < MaxCrash), so no reachable state is cut.

\* Liveness properties (require FairSpec's weak fairness):
\*   LeaderEventuallyElected  — a leader is eventually elected.
\*   ProgressToCommit         — the cluster eventually commits an entry (no stall).
\*   EntryEventuallyCommitted — once a leader holds an entry, it is eventually committed.
PROPERTY LeaderEventuallyElected
PROPERTY ProgressToCommit
PROPERTY EntryEventuallyCommitted
