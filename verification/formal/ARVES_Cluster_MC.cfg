\* TLC model-checking configuration for ARVES_Cluster.tla
\* Verification evidence for the I2 distributed commit/leader protocol. NOT
\* normative spec (edits no frozen .docx; ED-001).
\*
\* THREE nodes (the smallest interesting quorum group: majority = 2, so a single
\* node cannot commit and any two quorums intersect in exactly the node the
\* safety argument needs). MaxTerm = 3 admits multiple elections and leader
\* changes across terms (the setting that exercises Leader Completeness and the
\* Sec.5.4.2 current-term commit rule); MaxLogLen = 3 admits divergent-then-
\* reconciled logs. The reachable state space is finite and TLC exhausts it.
\*
\* n1,n2,n3 are TLC model values (interchangeable replica identities).

SPECIFICATION Spec

CONSTANTS
    Server = {n1, n2, n3}
    Nil = Nil
    MaxTerm = 3
    MaxLogLen = 3

\* NO SYMMETRY. Although this is a safety-only spec (where symmetry over Server
\* would be sound), we deliberately check the FULL state graph for auditability -
\* mirroring the kernel run's choice after the symmetry-during-liveness
\* unsoundness recorded in TLC_RUN.md. The space is tractable without it.

\* Belt-and-suspenders finiteness bound (the guards already keep it finite).
CONSTRAINT StateConstraint

\* Safety: checked as a state invariant (holds in every reachable state).
\* SafetyInv conjoins TypeOK, ElectionSafety, LogMatching, StateMachineSafety,
\* LeaderCompleteness, and LinearizableCommit.
INVARIANT SafetyInv
