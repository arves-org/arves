\* TLC config — DURABILITY (crash/recovery) safety check for ARVES_ClusterLive.tla.
\* Verification evidence for the I2 distributed protocol. NOT normative spec
\* (edits no frozen .docx; ED-001).
\*
\* Full nondeterministic election (SoleCandidate = Nil) PLUS up to MaxCrash
\* crash/restart events. A crash drops volatile {role, commitIndex, votes} and keeps
\* persistent {currentTerm, votedFor, log} — the faithful Raft persistence boundary.
\* We check that committed truth SURVIVES crashes: every committed entry stays
\* quorum-durable (DurableOnQuorum) and committed truth never diverges (the Raft
\* safety invariants still hold in every post-crash state). Safety-only: no fairness,
\* no symmetry (full state graph, for auditability). The space is finite and TLC
\* exhausts it.
\*
\* n1,n2,n3 are TLC model values (interchangeable replica identities).

SPECIFICATION Spec

CONSTANTS
    Server = {n1, n2, n3}
    Nil = Nil
    MaxTerm = 3
    MaxLogLen = 2
    MaxCrash = 2
    SoleCandidate = Nil

CONSTRAINT StateConstraint

\* Safety + durability: holds in every reachable state, including every post-crash
\* state. DurableSafetyInv conjoins TypeOK, ElectionSafety, LogMatching,
\* StateMachineSafety, LeaderCompleteness, LinearizableCommit, and DurableOnQuorum.
INVARIANT DurableSafetyInv
